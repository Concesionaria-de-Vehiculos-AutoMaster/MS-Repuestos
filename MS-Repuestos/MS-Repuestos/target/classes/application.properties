spring.application.name=MS-Repuestos
# 1. CONFIGURACIÓN DE LA BASE DE DATOS (MariaDB)
spring.datasource.url=jdbc:mariadb://localhost:3306/repuestos_DB
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# 2. CONFIGURACIÓN DE JPA / HIBERNATE
# 'update' crea las tablas automáticamente si no existen o las actualiza
spring.jpa.hibernate.ddl-auto=update

# Dialecto específico para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# 3. CONFIGURACIÓN DEL SERVIDOR (Opcional)
server.port=8083